<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Consulta de Logs</title>
</head>

<form method="get">
  {{ form.as_p }}
  <button type="submit">Filtrar</button>
</form>

<table border="1">
  <thead>
    <tr>
      <th>Fecha</th>
      <th>Usuario</th>
      <th>Operación</th>
      <th>Descripción</th>
    </tr>
  </thead>
  <tbody>
    {% for log in logs %}
      <tr>
        <td>{{ log.fecha }}</td>
        <td>{{ log.usuario.username }}</td>
        <td>{{ log.operacion }}</td>
        <td>{{ log.descripcion }}</td>
      </tr>
    {% empty %}
      <tr><td colspan="4">No hay resultados.</td></tr>
    {% endfor %}
  </tbody>
</table>

</html>
