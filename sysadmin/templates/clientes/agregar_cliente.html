{% extends "base/base.html" %}

{% block title %}Agregar Cliente | SysAdmin{% endblock %}

{% block content %}
<div class="contenedor">
    <h1 class="titulo-principal"><i class="ri-user-add-fill"></i> Registrar Nuevo Cliente</h1>

    <div class="formulario-contenedor">
        
        {% if error %}
            <div class="toast error" style="position: static; margin-bottom: 20px; width: 100%; opacity: 1;">
                <i class="ri-error-warning-fill"></i>
                <span>{{ error }}</span>
            </div>
        {% endif %}
        
        {% if mensaje %}
            <div class="toast success" style="position: static; margin-bottom: 20px; width: 100%; opacity: 1;">
                <i class="ri-checkbox-circle-fill"></i>
                <span>{{ mensaje }}</span>
            </div>
        {% endif %}

        <form method="post" action="{% url 'agregar_cliente' %}">
            {% csrf_token %}
            
            <div class="formulario-grid">
                <div class="campo-form">
                    <label for="nombre"><i class="ri-user-line"></i> Nombre</label>
                    <input type="text" id="nombre" name="nombre" class="sin-acentos" 
                        placeholder="Ej. Juan" title="Solo letras sin acentos ni caracteres especiales" 
                        pattern="[A-Za-z\s]+" required>
                </div>

                <div class="campo-form">
                    <label for="apellido"><i class="ri-user-line"></i> Apellido</label>
                    <input type="text" id="apellido" name="apellido" class="sin-acentos" 
                        placeholder="Ej. Ocegueda" title="Solo letras sin acentos ni caracteres especiales" 
                        pattern="[A-Za-z\s]+" required>
                </div>

                <div class="campo-form">
                    <label for="telefono"><i class="ri-phone-line"></i> Teléfono</label>
                    <input type="text" id="telefono" name="telefono" maxlength="10" 
                        placeholder="Ej. 5512345678" pattern="\d{10}" title="Ingresa exactamente 10 números" 
                        required oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                </div>

                <div class="campo-form">
                    <label for="correo"><i class="ri-mail-line"></i> Correo Electrónico</label>
                    <input type="email" id="correo" name="correo" 
                        placeholder="ejemplo@correo.com" title="Formato válido: nombre@dominio.com" required>
                </div>

                <div class="campo-form" style="grid-column: 1 / -1;">
                    <label for="direccion"><i class="ri-map-pin-line"></i> Dirección</label>
                    <input type="text" id="direccion" name="direccion" class="sin-acentos" 
                        placeholder="Ej. Calle Principal 123, Colonia Centro" title="Evita acentos y caracteres especiales" 
                        pattern="[A-Za-z0-9\s#\-.,]+" required>
                </div>
            </div>

            <div class="boton-submit" style="margin-top: 30px;">
                <button type="submit" class="btn btn-primario" style="width: 100%; font-size: 1.1rem; padding: 12px;">
                    <i class="ri-save-line"></i> Guardar Cliente
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll("input.sin-acentos").forEach(input => {
            input.addEventListener("input", (e) => {
                const sinAcentos = e.target.value.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                if (e.target.value !== sinAcentos) {
                    e.target.value = sinAcentos;
                }
            });
        });
    });
</script>
{% endblock %}
