<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error {{ codigo }} | SysAdmin</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .error-card { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; max-width: 500px; border-top: 5px solid #e11d48; }
        .error-icon { font-size: 5rem; color: #e11d48; margin-bottom: 10px; }
        h1 { color: #1e293b; margin: 0 0 10px 0; font-size: 2.5rem; }
        p { color: #64748b; font-size: 1.1rem; line-height: 1.5; margin-bottom: 25px; }
        .btn { background-color: #3b82f6; color: white; text-decoration: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; display: inline-block; transition: background 0.3s; }
        .btn:hover { background-color: #2563eb; }
    </style>
</head>
<body>
    <div class="error-card">
        <i class="ri-alert-fill error-icon"></i>
        <h1>Error {{ codigo }}</h1>
        <p>{{ mensaje }}</p>
        
        <a href={% url "home" %} class="btn"><i class="ri-home-4-line"></i> Volver al Inicio</a>
    </div>
</body>
</html>
